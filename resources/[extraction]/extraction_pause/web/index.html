<!doctype html>
<html lang="en" class="pause-closed">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Los Santos Extraction Pause</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app" class="app" aria-hidden="true">
      <section class="pause-shell" aria-label="Extraction pause menu">
        <div>
          <p class="eyebrow">Session Paused</p>
          <h1>Operations Menu</h1>
          <p class="copy">Native GTA pause and map are disabled. Use LSX systems for loadout, raid control and tactical navigation.</p>
        </div>

        <nav class="pause-actions">
          <button data-action="close" type="button"><span>Esc</span><strong>Resume</strong></button>
          <button data-action="openLobby" type="button"><span>Hub</span><strong>Open Lobby</strong></button>
          <button data-action="openInventory" type="button"><span>Kit</span><strong>Loadout / Field Bag</strong></button>
          <button data-action="leaveRaid" type="button"><span>Raid</span><strong>Leave Raid</strong></button>
          <button data-action="soon" data-label="Tactical map" type="button"><span>Map</span><strong>Tactical Map Soon</strong></button>
          <button data-action="soon" data-label="Settings" type="button"><span>Cfg</span><strong>Settings Soon</strong></button>
        </nav>

        <footer>
          <span>LSX</span>
          <p>No native GTA map. Tactical map will be a custom extraction screen.</p>
        </footer>

        <div id="toast" class="toast"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
