<!DOCTYPE html>
<html lang="en" class="nui-closed">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extraction Inventory</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: rgba(0, 0, 0, 0) !important;
      background-color: rgba(0, 0, 0, 0) !important;
    }

    html.nui-closed,
    html.nui-closed body {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
      pointer-events: none !important;
    }
  </style>
  <link rel="stylesheet" href="inventory.css" />
</head>
<body>
  <main id="app" class="app" aria-hidden="true">
    <section class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">EXTRACTION OPS</p>
          <h1>Inventory</h1>
        </div>
        <div class="actions">
          <button id="refreshButton" class="ghost">Refresh</button>
          <button id="closeButton" class="ghost">Close</button>
        </div>
      </header>

      <section class="layout">
        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Secure Storage</p>
              <h2>Stash</h2>
            </div>
            <button id="sellButton" class="accent">Sell All</button>
          </div>
          <div id="stashList" class="list"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p id="secondaryKicker" class="panel-kicker">Raid Ready</p>
              <h2 id="secondaryTitle">Loadout</h2>
            </div>
            <div id="bagMeta" class="meta-pill">Ready</div>
          </div>
          <div id="bagList" class="list"></div>
        </article>
      </section>
    </section>
  </main>

  <script src="inventory.js"></script>
</body>
</html>
