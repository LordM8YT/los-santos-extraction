<!DOCTYPE html>
<html lang="en" class="nui-closed">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extraction Inventory</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: rgba(0, 0, 0, 0) !important;
      background-color: rgba(0, 0, 0, 0) !important;
    }

    html.nui-closed,
    html.nui-closed body {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
      pointer-events: none !important;
    }
  </style>
  <link rel="stylesheet" href="inventory.css" />
</head>
<body>
  <main id="app" class="app" aria-hidden="true">
    <section class="shell">
      <div class="atmosphere" aria-hidden="true"></div>
      <header class="hero">
        <div>
          <p class="eyebrow">LSX Armory</p>
          <h1>Loadout Terminal</h1>
          <span class="subtitle">Secure stash, raid bag and field kit overview.</span>
        </div>
        <div class="actions">
          <button id="refreshButton" class="ghost" type="button">Refresh</button>
          <button id="closeButton" class="ghost" type="button">Close</button>
        </div>
      </header>

      <section class="summary-strip" aria-label="Inventory summary">
        <article>
          <span>Secured Value</span>
          <strong id="stashValueMeta">$0</strong>
        </article>
        <article>
          <span>Carry Weight</span>
          <strong id="carryWeightMeta">0 / 0</strong>
        </article>
        <article>
          <span>Mode</span>
          <strong id="modeMeta">Safehouse</strong>
        </article>
      </section>

      <section class="layout">
        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Secure Storage</p>
              <h2>Stash</h2>
            </div>
            <button id="sellButton" class="accent" type="button">Sell All</button>
          </div>
          <div id="stashList" class="list tetris-grid"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p id="secondaryKicker" class="panel-kicker">Raid Ready</p>
              <h2 id="secondaryTitle">Loadout</h2>
            </div>
            <div id="bagMeta" class="meta-pill">Ready</div>
          </div>
          <div id="bagList" class="list tetris-grid"></div>
        </article>
      </section>

      <section id="dropZone" class="drop-zone" aria-label="Drop item zone">
        <strong>Drop Zone</strong>
        <span>Drag raid bag items here to drop one on the ground.</span>
      </section>
    </section>
  </main>

  <script src="inventory.js"></script>
</body>
</html>
