# Safe example config for development handoff.
# Copy this to server.cfg locally and add your own sv_licenseKey.

sv_hostname "Los Santos Extraction"
sets sv_projectName "Los Santos Extraction"
sets sv_projectDesc "Standalone PvPvE extraction shooter prototype."
sets tags "extraction, pvpve, standalone"
sets locale "en-US"

sv_enforceGameBuild 3258
sv_licenseKey "CHANGE_ME"
sv_maxclients 48
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
set steam_webApiKey "none"
# extraction_chat replaces the default chat UI with a transparent NUI overlay.
set resources_useSystemChat false

ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure hardcap

ensure ox_lib
ensure EasyAdmin
ensure extraction_items

ensure extraction_loadscreen
ensure extraction_core
ensure extraction_admin
ensure extraction_chat
ensure extraction_world
ensure extraction_character
ensure extraction_inventory
ensure extraction_hud
ensure extraction_lobby
ensure extraction_pause
ensure standalone_extraction

